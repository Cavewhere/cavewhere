name: Build on Windows

on:
  push:
    branches:
      - master
  # pull_request:
  #   branches:
  #     - dev

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0 # Fetch the tags for the versions to work correctly

      - name: Install Ninja
        run: |
          choco install ninja

      - name: Verify Ninja Installation
        run: |
          where ninja

      - name: Install Inno Setup
        run: |
          choco install innosetup

      # aqtinstall can't resolve Qt 6.11.0 on Windows due to missing top-level
      # Updates.xml in the Qt repo. Switching back once aqtinstall is fixed.
      # - name: Install Qt
      #   uses: jurplel/install-qt-action@v4
      #   env:
      #     AQT_CONFIG: ${{ github.workspace }}/.github/aqt.ini
      #   with:
      #     aqtversion: '==3.3.*'
      #     version: '6.11.1'
      #     host: 'windows'
      #     target: 'desktop'
      #     arch: 'win64_msvc2022_64'
      #     modules: 'qtshadertools qtcanvaspainter qtpdf'
      - name: Install Qt
        shell: pwsh
        run: |
          $ver = "6.11.1-0-202605090529"
          $repoBase = "https://qt.mirror.constant.com/online/qtsdkrepository/windows_x86/desktop/qt6_6111/qt6_6111_msvc2022_64"
          $qtRoot = "${{ github.workspace }}\Qt"
          New-Item -ItemType Directory -Force -Path $qtRoot | Out-Null

          # Each entry is: subdir-in-repo, archive-filename
          $packages = @(
            @("qt.qt6.6111.win64_msvc2022_64", "qtbase-Windows-Windows_11_24H2-MSVC2022-Windows-Windows_11_24H2-X86_64.7z"),
            @("qt.qt6.6111.win64_msvc2022_64", "qtsvg-Windows-Windows_11_24H2-MSVC2022-Windows-Windows_11_24H2-X86_64.7z"),
            @("qt.qt6.6111.win64_msvc2022_64", "qtdeclarative-Windows-Windows_11_24H2-MSVC2022-Windows-Windows_11_24H2-X86_64.7z"),
            @("qt.qt6.6111.win64_msvc2022_64", "qttools-Windows-Windows_11_24H2-MSVC2022-Windows-Windows_11_24H2-X86_64.7z"),
            @("qt.qt6.6111.win64_msvc2022_64", "qttranslations-Windows-Windows_11_24H2-MSVC2022-Windows-Windows_11_24H2-X86_64.7z"),
            @("qt.qt6.6111.addons.qtshadertools.win64_msvc2022_64", "qtshadertools-Windows-Windows_11_24H2-MSVC2022-Windows-Windows_11_24H2-X86_64.7z"),
            @("qt.qt6.6111.addons.qtcanvaspainter.win64_msvc2022_64", "qtcanvaspainter-Windows-Windows_11_24H2-MSVC2022-Windows-Windows_11_24H2-X86_64.7z")
          )

          foreach ($pkg in $packages) {
            $subdir = $pkg[0]
            $archive = $pkg[1]
            $url = "$repoBase/$subdir/$ver$archive"
            $outFile = "$env:TEMP\$archive"
            Write-Host "Downloading $archive..."
            Invoke-WebRequest -Uri $url -OutFile $outFile -UseBasicParsing
            7z x $outFile -o"$qtRoot" -y | Out-Null
            Remove-Item $outFile
          }

          # Qt PDF is released separately under the extensions/ path
          $pdfVer = "6.11.1-0-202605090527"
          $pdfRepoBase = "https://qt.mirror.constant.com/online/qtsdkrepository/windows_x86/extensions/qtpdf/6111/msvc2022_64"
          $pdfSubdir = "extensions.qtpdf.6111.win64_msvc2022_64"
          $pdfArchive = "qtpdf-Windows-Windows_11_24H2-MSVC2022-Windows-Windows_11_24H2-X86_64.7z"
          $pdfUrl = "$pdfRepoBase/$pdfSubdir/$pdfVer$pdfArchive"
          $pdfOutFile = "$env:TEMP\$pdfArchive"
          Write-Host "Downloading $pdfArchive (extension)..."
          Invoke-WebRequest -Uri $pdfUrl -OutFile $pdfOutFile -UseBasicParsing
          7z x $pdfOutFile -o"$qtRoot" -y | Out-Null
          Remove-Item $pdfOutFile

          Write-Host "Qt installed to $qtRoot"

      - name: Install Locale::PO
        run: |
          cpan Locale::PO

      - name: Installing Conan
        run: |
          pipx install conan

      - name: Check Conan Version
        run: conan --version

      - name: Configure Conan Profile
        run: |
          conan profile detect --force

      # Append your tool_requires to ~/.conan2/profiles/default
      # This is a work around for wxwidgets https://github.com/conan-io/conan-center-index/issues/26878
      # This can be remove once conan is fixed
      - name: Add CMake tool requirement
        shell: pwsh
        run: |
          # grab your Conan home dir
          $base = & conan config home

          # build the path to profiles/default
          $profile = Join-Path $base 'profiles\default'

          # append a blank line, then your [tool_requires] block
          Add-Content -Path $profile -Value ''
          Add-Content -Path $profile -Value '[tool_requires]'
          Add-Content -Path $profile -Value '!cmake/*: cmake/[>=3 <4]'

      - name: Cache Conan Packages
        id: cache-conan
        uses: actions/cache@v5
        with:
          path: C:/Users/runneradmin/.conan2
          key: ${{ runner.os }}-conan-win3-${{ hashFiles('conanfile.*') }}
          restore-keys: |
            ${{ runner.os }}-conan-win3-

      - name: Install Dependencies with Conan
        run: |
          conan install . --build=missing --output-folder=build -s:h compiler.cppstd=20 -s:b compiler.cppstd=20 -s compiler.version=194 -c tools.cmake.cmaketoolchain:generator=Ninja

      - name: Verify Toolchain File
        run: |
          cat build/conan_toolchain.cmake

      # - name: List CMake Generators
      #   run: cmake --help

      - name: Configure the Project with CMake
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF -DCMAKE_PREFIX_PATH="${{ github.workspace }}\Qt" -DCMAKE_TOOLCHAIN_FILE="build/conan_toolchain.cmake" -S . -B build

      - name: Build Windows Installer
        run: cmake --build build --target windowsInstaller --parallel

      - name: Get Git tag
        id: git_tag
        run: echo "tag=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v7
        with:
          name: cavewhere-windows-installer-${{ steps.git_tag.outputs.tag }}
          path: build/Cavewhere *.exe #Needs the space to grab the just the installer
