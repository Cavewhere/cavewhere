syntax = "proto3";
import "qt.proto";

// Standalone schema for the symbology palette system (see
// plans/SYMBOLOGY_PALETTE_PLAN.html). Kept separate from cavewhere.proto so
// palettes version on their own clock and third-party consumers can read a
// palette without pulling in the whole project schema.
//
// Colors are hex strings ("#RRGGBB" / "#RRGGBBAA") matching cavewhere.proto's
// existing convention — no QtProto.QColor message.
//
// Field-presence: fields whose value-type default is non-zero/true are marked
// `optional` so an absent field can be distinguished from a zero value and the
// C++ default applied on load.

package CavewhereSymbologyProto;

message Palette {
    string id          = 1;       // UUID — palettes keep UUIDs
    string name        = 2;       // human-readable display name
    string description = 3;
    string author      = 4;
    string version     = 5;       // semver-ish, author's choice
    repeated LineBrush lineBrushes = 6;
    repeated GlyphMetadata glyphs  = 7;  // glyph index; each glyph's strokes live in its own file
    // 8 reserved for `repeated AreaBrush  areaBrushes`
    // 9 reserved for `repeated PointBrush pointBrushes`
}

// Glyph index entry stored in the palette file. The strokes — the bulk of a
// glyph — live in a separate per-glyph file (glyphs/<name>.cwglyph) so editing
// one glyph rewrites one file and gives clean git diffs. The glyph's paper-mm
// bounds are computed on demand from the strokes, never stored.
message GlyphMetadata {
    string name        = 1;  // machine identifier, kebab-case, unique within palette
    string displayName = 2;  // human-readable label (stored verbatim, not translated)
}

// The per-glyph file payload (glyphs/<name>.cwglyph). Self-contained so a glyph
// round-trips independently of its palette. Strokes are glyph-local paper-mm.
message Glyph {
    string name                  = 1;  // must match the palette's GlyphMetadata entry
    string displayName           = 2;
    repeated GlyphStroke strokes = 3;
}

// Glyph strokes mirror cavewhere.proto's PenStroke/PenPoint but are redeclared
// here so the palette schema stays standalone (no cavewhere.proto import).
message GlyphStroke {
    string brushName                 = 1;  // resolves to a cwLineBrush in this palette
    repeated GlyphStrokePoint points = 2;
    string id                        = 3;  // UUID
}

message GlyphStrokePoint {
    QtProto.QPointF position = 1;
    optional double pressure = 2;  // -1 == unknown
    int64           timestampMs = 3;
}

message LineBrush {
    string name        = 1;                // machine identifier, kebab-case, unique within palette
    string displayName = 2;                // human-readable label, mutable (stored verbatim, not translated)
    string category    = 3;                // display-only grouping in pickers
    bool   scrapOutline = 4;               // topology flag — feeds chain-based scrap detector
    int32  zOrder       = 5;               // paint order
    repeated DecorationLayer decorations = 6;  // empty = no ink (scrap-outline case)
    double minPaperScale = 7;
    double maxPaperScale = 8;
    // No centerline fields. A normal wall's visible line is an
    // OffsetCurve decoration layer with offset = 0.
}

message DecorationLayer {
    string glyphName = 1;                  // glyph ref by name; empty when mode == OffsetCurve
    int32  mode      = 2;                  // 0=rigid, 1=bending, 2=point, 3=offsetCurve
    repeated PlacementRule rules = 3;      // empty = use the mode's default rule stack

    optional double bufferMm          = 4; // collision keep-clear, default 1.0 mm. Currently dormant.
    int32  collisionPriority          = 5; // MutateScene tiebreak
    double minPaperScale              = 6;
    double maxPaperScale              = 7;

    // OffsetCurve params. Ignored when mode != OffsetCurve. Currently only
    // offsetCurveOffsetMm = 0 is supported (the centerline-replacement path).
    string          offsetCurveColorLight = 8;
    string          offsetCurveColorDark  = 9;
    optional double offsetCurveWidthMm    = 10; // default 0.4 mm
    double          offsetCurveOffsetMm   = 11; // sign = side; 0 = on the centerline
    optional int32  offsetCurveDash       = 12; // Qt::PenStyle, default SolidLine
    optional int32  offsetCurveCap        = 13; // Qt::PenCapStyle, default RoundCap
    optional int32  offsetCurveJoin       = 14; // Qt::PenJoinStyle, default RoundJoin
    optional bool   offsetCurveAcceptsPressure = 15; // default true
}

message PlacementRule {
    // Rule kind keyed by `name` ("uniform-spacing", …). Params live in `params`
    // so an unknown rule round-trips intact and is ignored at render time with a
    // one-shot warning. Renaming a registered rule is a breaking change.
    string name   = 1;
    bytes  params = 2;                      // proto-encoded per-rule struct
}
