syntax = "proto3";
import "qt.proto";
import "cavewhere_common.proto";

// Schema for the symbology palette system (see plans/SYMBOLOGY_PALETTE_PLAN.html).
// Kept in its own file so a third-party consumer can read a palette by importing
// only this schema plus the small shared cavewhere_common.proto, without pulling
// in the whole project schema. Palettes are versioned on the same clock as
// projects: every file carries a CavewhereCommonProto.FileVersion stamped with
// cwRegionIOTask::protoVersion(), and a palette newer than the running build is
// gated read-only (same rule cavewhere.proto entities follow).
//
// Colors are hex strings ("#RRGGBB" / "#RRGGBBAA") matching cavewhere.proto's
// existing convention — no QtProto.QColor message.
//
// Field-presence: fields whose value-type default is non-zero/true are marked
// `optional` so an absent field can be distinguished from a zero value and the
// C++ default applied on load.

package CavewhereSymbologyProto;

// Palette-level identity only (palette.json). Membership is the directory: the
// set of brushes/<name>.cwbrush and glyphs/<name>.cwglyph files *is* the palette,
// so independent adds merge with zero git conflict and palette.json changes only
// when identity does. See plans/SYMBOLOGY_PALETTE_DIRECTORY_TRUTH_PLAN.md.
message Palette {
    string id          = 1;       // UUID — palettes keep UUIDs
    string name        = 2;       // human-readable display name
    string description = 3;
    string author      = 4;
    string version     = 5;       // semver-ish, author's choice
    optional CavewhereCommonProto.FileVersion fileVersion = 6; // save/load format stamp
}

// The per-glyph file payload (glyphs/<name>.cwglyph). Self-contained so a glyph
// round-trips independently of its palette. Strokes are glyph-local paper-mm.
// The glyph's paper-mm bounds are computed on demand from the strokes, never
// stored.
message Glyph {
    string name                  = 1;  // must match the file stem (glyphs/<name>.cwglyph)
    string displayName           = 2;
    repeated CavewhereCommonProto.Stroke strokes = 3; // glyph-local paper-mm strokes
    optional CavewhereCommonProto.FileVersion fileVersion = 4; // save/load format stamp
}

// The per-file payload for brushes/<name>.cwbrush, exactly as Glyph is for
// glyphs/<name>.cwglyph. Self-contained so a brush round-trips independently of
// its palette.
message LineBrush {
    string name        = 1;                // machine identifier, kebab-case, must match the file stem
    string displayName = 2;                // human-readable label, mutable (stored verbatim, not translated)
    string category    = 3;                // display-only grouping in pickers
    bool   scrapOutline = 4;               // topology flag — feeds chain-based scrap detector
    int32  zOrder       = 5;               // paint order
    repeated DecorationLayer decorations = 6;  // empty = no ink (scrap-outline case)
    double minPaperScale = 7;
    double maxPaperScale = 8;
    optional CavewhereCommonProto.FileVersion fileVersion = 9; // save/load format stamp
    // No centerline fields. A normal wall's visible line is a decoration layer
    // whose rule stack traces an offset polyline at offset = 0.
}

message DecorationLayer {
    reserved 2;                            // was `mode`; layers are now defined entirely by `rules`
    reserved "mode";
    string glyphName = 1;                  // glyph ref for stamp layers; empty for line (offset-polyline) layers
    repeated PlacementRule rules = 3;      // the placement-rule stack; empty = no ink

    optional double bufferMm          = 4; // collision keep-clear, default 1.0 mm. Currently dormant.
    int32  collisionPriority          = 5; // MutateScene tiebreak
    double minPaperScale              = 6;
    double maxPaperScale              = 7;

    // OffsetCurve params. Ignored when mode != OffsetCurve. Currently only
    // offsetCurveOffsetMm = 0 is supported (the centerline-replacement path).
    string          offsetCurveColorLight = 8;
    string          offsetCurveColorDark  = 9;
    optional double offsetCurveWidthMm    = 10; // default 0.4 mm
    double          offsetCurveOffsetMm   = 11; // sign = side; 0 = on the centerline
    optional int32  offsetCurveDash       = 12; // Qt::PenStyle, default SolidLine
    optional int32  offsetCurveCap        = 13; // Qt::PenCapStyle, default RoundCap
    optional int32  offsetCurveJoin       = 14; // Qt::PenJoinStyle, default RoundJoin
    optional bool   offsetCurveAcceptsPressure = 15; // default true
}

message PlacementRule {
    // Rule kind keyed by `name` ("uniform-spacing", …). Params live in `params`
    // so an unknown rule round-trips intact and is ignored at render time with a
    // one-shot warning. Renaming a registered rule is a breaking change.
    string name   = 1;
    bytes  params = 2;                      // proto-encoded per-rule struct
}
