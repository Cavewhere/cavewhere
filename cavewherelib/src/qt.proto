syntax = "proto3";
package QtProto;

message QVector3D {
    float x = 1;
    float y = 2;
    float z = 3;
}

message QVector2D {
    float x = 1;
    float y = 2;
}

message QPointF {
    double x = 1;
    double y = 2;
}

//For backwards compatiblity
message QString {
    bytes stringData = 1;
}

message QDate {
    int32 year = 1;
    int32 month = 2;
    int32 day = 3;
}

message QSize {
    int32 width = 1;
    int32 height = 2;
}

message QSizeF {
    double width = 1;
    double height = 2;
}

message QStringList {
    repeated QString legacy_strings = 1;
}

message QUuid {
    bytes uuid = 1;  // store QUuid as 16 raw bytes
}

message QQuaternion {
    float x = 1;
    float y = 2;
    float z = 3;
    float scalar = 4;
}
