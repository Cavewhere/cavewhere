syntax = "proto3";
import "qt.proto";

// Field-number allocation rules
// ─────────────────────────────
// • Fields prefixed `legacy_` exist only for loading old binary protobuf (V5/V6).
//   They must keep their numbers so ParseFromString() still works on SQLite blobs.
//   Never write to legacy_ fields in new code.
// • When a field definition is removed entirely, add `reserved <N>;` on the same
//   message to prevent accidental reuse (see Image field 9, SurveyChunk field 3,
//   ProjectMetadata field 2).
// • New fields should use the next available number in their message.

package CavewhereProto;

message FileVersion {
    optional int32 version = 1; //Protobuf file version
    optional string cavewhereVersion = 2;
}

message ProjectMetadata {
    optional string dataRoot = 1;
    reserved 2; // Removed: GitMode enum (only ManagedNew was ever used)
    reserved 5; // Removed: worldOrigin (derived from fix-station centroid; recomputed on load)
    reserved 6; // Removed: lazLayers (now discovered via folder scan of "GIS Layers/")
    optional bool syncEnabled = 3;
    optional string globalCoordinateSystem = 4;
    repeated LazLayerState lazLayerStates = 7;
}

// Per-LAZ-layer user state overlaid on top of the folder-scan discovery in
// "GIS Layers/". Entries are written only for layers that diverge from
// defaults (e.g. enabled = false), keeping the file lean.
message LazLayerState {
    optional string relativePath = 1; // path relative to "GIS Layers/"
    optional bool enabled = 2;        // absence == true (default)
}

// Per-LAZ-layer persistent state. Stored as <basename>.cwlaz next to the
// matching .laz/.las file in "GIS Layers/". Discovery is by folder scan;
// the project's .cwproj file no longer references individual LAZ layers.
message LazLayer {
    optional FileVersion fileVersion = 1;
    optional string id = 2;       // UUID, stable across reopen
    optional bool enabled = 3;    // default true; absence == true
}

message Project {
    optional FileVersion fileVersion = 1;
    optional string name = 2;
    optional ProjectMetadata metadata = 3;
    optional string id = 4; // UUID, stable across renames
}

//This is a legacy message, do not use
message CavingRegion {
    repeated Cave caves = 1;
    optional int32 version = 2;
    optional QtProto.QString legacy_cavewhereVersion = 3;
    optional string cavewhereVersion = 4;
    optional string name = 5;
}

message DoubleVector3d {
    optional double x = 1;
    optional double y = 2;
    optional double z = 3;
}

message FixStation {
    optional string id = 1;
    optional string stationName = 2;
    optional string inputCS = 3;
    optional double easting = 4;
    optional double northing = 5;
    optional double elevation = 6;
    optional double horizontalVariance = 7;
    optional double verticalVariance = 8;
}

message Cave {
    optional FileVersion fileVersion = 9;
    optional string name = 8;
    optional string id = 10;
    repeated Trip legacy_trips = 2; // Legacy v6 only, not written in v9+

    //This probably should be in a settings file (global / local) somewhere
    optional Units.LengthUnit lengthUnit = 3;
    optional Units.LengthUnit depthUnit = 4;

    // Legacy v6 only, not written in v9+ (recomputed at runtime)
    optional StationPositionLookup legacy_stationPositionLookup = 5;
    optional bool legacy_stationPositionLookupStale = 6;
    optional SurveyNetwork legacy_network = 7;

    //Deprecated types, don't use
    optional QtProto.QString legacy_name = 1;

    repeated FixStation fixStations = 11;
}

message Trip {
    optional FileVersion fileVersion = 8;
    optional string name = 7;
    optional string id = 9;
    optional QtProto.QDate date = 2;
    optional TripCalibration tripCalibration = 4;
    repeated SurveyChunk chunks = 5;
    optional Team team = 6;

    //Deprecated types, don't use
    optional SurveyNoteModel legacy_noteModel = 3; // Legacy v6 only, not written in v9+ (notes loaded from .cwnote files)
    optional QtProto.QString legacy_name = 1;
}

//This is a legacy message, do not use, use StationShot instead
message Station {
    optional string name = 14;

    //---- Version = 6 attributes
    optional DistanceReading legacy_leftReading = 10;
    optional DistanceReading legacy_rightReading = 11;
    optional DistanceReading legacy_upReading = 12;
    optional DistanceReading legacy_downReading = 13;

    //Deprecated types, don't use
    optional QtProto.QString legacy_name = 1;

    //---- Version <= 5 attributes, don't use, legacy
    optional double legacy_left = 2; //This is deprecated use leftReading
    optional double legacy_right = 3; //This is deprecated use rightReading
    optional double legacy_up = 4; //This is deprecated use upReading
    optional double legacy_down = 5; //This is deprecated use downReading
    optional DistanceStates.State legacy_leftState = 6 ; //This is deprecated use leftReading
    optional DistanceStates.State legacy_rightState = 7; //This is deprecated use rightReading
    optional DistanceStates.State legacy_upState = 8; //This is deprecated use upReading
    optional DistanceStates.State legacy_downState = 9; //This is deprecated use downReading
}

//This is a legacy message, do not use
message SurveyNoteModel {
    repeated Note notes = 1;
}

message Note {
    optional FileVersion fileVersion = 6;
    optional Image image = 1;
    optional double rotation = 2;
    repeated Scrap scraps = 3;
    optional ImageResolution imageResolution = 4;
    optional string name = 5;
    optional string id = 7;

}

//This is a legacy message, do not use
message Image {
    enum Unit {
        Pixels = 0;
        Points = 1;
        SvgUnits = 2;
    }

    optional int32 legacy_originalId = 1;
    optional int32 legacy_iconId = 2;
    repeated int32 legacy_mipmapIds = 3;
    optional QtProto.QSize size = 4;
    optional int32 dotPerMeter = 5;
    optional QtProto.QSizeF legacy_clipArea = 6; // Legacy, not used
    optional string path = 7;
    optional int32 page = 8;
    reserved 9;
    optional Unit imageUnit = 10;
}

message TripCalibration {
    optional bool correctedCompassBacksight = 1;
    optional bool correctedClinoBacksight = 2;
    optional double tapeCalibration = 3;
    optional double frontCompassCalibration = 4;
    optional double frontClinoCalibration = 5;
    optional double legacy_backCompasssCalibration = 6 [json_name = "backCompasssCalibration"];
    optional double backCompassCalibration = 14;
    optional double backClinoCalibration= 7;
    optional double declination = 8;
    optional Units.LengthUnit distanceUnit = 9;
    optional bool frontSights = 10;
    optional bool backSights = 11;
    optional bool correctedCompassFrontsight = 12;
    optional bool correctedClinoFrontsight = 13;
    // Missing field on load → forced false, so legacy stored declination stays
    // the manual value rather than being silently overwritten by auto-IGRF.
    optional bool auto_declination = 15;
}

// ChunkCalibration message removed: per-shot calibration overrides were unused
// (no UI, silently dropped on v9 reload). Field 3 is reserved to prevent reuse.

message SurveyChunk {
    repeated Station legacy_stations = 1; // Legacy v6 only, not written in v9+
    repeated Shot legacy_shots = 2; // Legacy v6 only, not written in v9+
    reserved 3; // Removed: per-shot calibration overrides (unused feature)
    repeated StationShot leg = 4;
    optional string id = 5; //UUID
}

//This is a legacy message, do not use, use StationShot instead
message Shot {
    //---- Version <= 5 attributes
    optional double legacy_Distance = 1;
    optional double legacy_Compass = 2;
    optional double legacy_BackCompass = 3;
    optional double legacy_Clino = 4;
    optional double legacy_BackClino = 5;
    optional DistanceStates.State legacy_distanceState = 6;
    optional CompassStates.State legacy_compassState = 7;
    optional CompassStates.State legacy_backCompassState = 8;
    optional ClinoStates.State legacy_clinoState = 9;
    optional ClinoStates.State legacy_backClinoState = 10;

    //All versions
    optional bool includeDistance = 11;

    //--- Version = 6 attributes
    optional DistanceReading legacy_distanceReading = 12;
    optional CompassReading legacy_compassReading = 13;
    optional CompassReading legacy_backCompassReading = 14;
    optional ClinoReading legacy_clinoReading = 15;
    optional ClinoReading legacy_backClinoReading = 16;
}

//This merges stations and shots together, so it's easier to read in JSON
//This allows for interleaving stations and shots, this a union of cwStation and cwShot
//Proto array of stationshot is interleaved Station -> shot -> station -> shot -> station.
message StationShot {
    //optional Station station = 1;
    //optional Shot shot = 2;

    //Shared data
    optional string id = 1;

    //Station data
    optional string name = 100;
    optional string left = 101;
    optional string right = 102;
    optional string up = 103;
    optional string down = 104;

    //Shot data
    optional bool includeDistance = 1000;
    optional string distance = 1001;
    optional string compass = 1002;
    optional string backCompass = 1003;
    optional string clino = 1004;
    optional string backClino = 1005;
}

//This is a legacy message from < V5
message DistanceStates {
    enum State {
        Valid = 0;
        Empty = 1;
    }
}

//This is a legacy message from < V5
message CompassStates {
    enum State {
        Valid = 0;
        Empty = 1;
    }
}

//This is a legacy message from < V5
message ClinoStates {
    enum State {
        Valid = 0;
        Empty = 1;
        Down = 2;
        Up = 3;
    }
}

message Scrap {
    enum ScrapType {
        Plan = 0;
        RunningProfile = 1;
        ProjectedProfile = 2;
    }

    optional string id = 9; //Uuid
    repeated QtProto.QPointF outlinePoints = 1;
    repeated NoteStation noteStations = 2;
    optional NoteTransformation noteTransformation = 3;
    optional bool calculateNoteTransform = 4;
    repeated Lead leads = 6;
    optional ScrapType type = 7;
    optional ProjectedProfileScrapViewMatrix profileViewMatrix = 8; //Only used if type == ProjectedProfile

    reserved 5; // Removed: TriangulatedData triangleData — cached data, never saved/loaded
}

// Legacy — TriangulatedData was cached scrap geometry stored in the proto.
// No save/load code reads or writes it. Kept only so the generated code compiles
// for any transitive references; safe to delete once all references are removed.
message TriangulatedData {
    optional Image croppedImage = 1;
    repeated QtProto.QVector3D points = 2;
    repeated QtProto.QVector2D texCoords = 3;
    repeated uint32 indices = 4;
    optional bool stale = 5;
    repeated QtProto.QVector3D leadPositions = 6;
}

message NoteStation {
    optional string name = 3;
    optional QtProto.QPointF positionOnNote = 2;
    optional string id = 4;

    //Deprecated types, don't use
    optional QtProto.QString legacy_name = 1;
}

message NoteTransformation {
    optional double northUp = 1;
    optional Length scaleNumerator = 2;
    optional Length scaleDenominator = 3;
}

message Length {
    optional double value = 1;
    optional Units.LengthUnit unit = 2;
}

message ImageResolution {
    optional double value = 1;
    optional Units.ImageResolutionUnit unit = 2;
}

message Team {
    repeated TeamMember teamMembers = 1;
}

message TeamMember {
    optional string id = 4;
    optional string name = 3;    
    repeated string jobs = 5;

    optional QtProto.QStringList legacy_jobs = 2;
    optional QtProto.QString legacy_name = 1;
}

message Units {
    enum LengthUnit {
        Inches = 0;       //!< Inches
        Feet = 1;       //!< Feet
        Yards = 2;       //!< Yards
        Meters = 3;        //!< Meters
        Millimeters = 4;       //!< Millimeters
        Centimeters = 5;       //!< Centimeters
        Kilometers = 6;       //!< Kilometers
        LengthUnitless = 7;  //!< Invalid units or unit less
        Miles = 8;
    }

    enum ImageResolutionUnit {
        DotsPerInch = 0;
        DotsPerCentimeter = 1;
        DotsPerMeter = 2;
    }
}

message StationPositionLookup {
    repeated NamePosition stationPositions = 1;

    message NamePosition {
        optional string stationName = 3;
        optional QtProto.QVector3D position = 2;

        optional QtProto.QString legacy_stationName = 1;
    }
}

message Lead {
    optional QtProto.QPointF positionOnNote = 1;
    optional string description = 5;
    optional QtProto.QSizeF size = 3;
    optional bool completed = 4;
    optional string id = 6;

    optional QtProto.QString legacy_description = 2;
}

//This should be cached
message SurveyNetwork {
    repeated StationLookupItem stations = 1;

    message StationLookupItem {
        optional string stationName = 3;
        repeated string neighbors = 4;

        optional QtProto.QStringList legacy_neighbors = 2;
        optional QtProto.QString legacy_stationName = 1;
    }
}

message ProjectedProfileScrapViewMatrix {

    enum Direction {
        LookingAt = 0;
        LeftToRight = 1;
        RightToLeft = 2;
    }

    optional double azimuth = 1;
    optional Direction direction = 2;
}

//This is a legacy message, don't use
message DistanceReading {
    optional QtProto.QString legacy_value = 1;
}

//This is a legacy message, don't use
message CompassReading {
    optional QtProto.QString legacy_value = 1;
}
//This is a legacy message, don't use
message ClinoReading {
    optional QtProto.QString legacy_value = 1;
}

message NoteLiDARStation {
    optional string name = 1; //Relative path to 3d asset
    optional QtProto.QVector3D positionOnNote = 2;
    optional string id = 3;
}

message NoteLiDARTransformation {
    enum UpMode {
        Custom = 0;
        XisUp = 1;
        YisUp = 2;
        ZisUp = 3;
    };

    optional NoteTransformation planTransform = 1;
    optional UpMode upMode = 2;
    optional float upSign = 3;
    optional QtProto.QQuaternion upCustom = 4;
}

message NoteLiDAR {
    optional FileVersion fileVersion = 6;
    optional string name = 1;
    optional string fileName = 2;
    repeated NoteLiDARStation noteStations = 3;
    optional NoteLiDARTransformation noteTransformation = 4;
    optional bool autoCalculateNorth = 5;
    optional string id = 7;
}

message PenPoint {
    optional QtProto.QPointF position = 1;
    optional double pressure = 2;       // -1 == unknown
    optional int64 timestampMs = 3;
}

message PenStroke {
    enum Kind {
        Wall = 0;
        Feature = 1;
        ScrapOutline = 2;
    }
    optional Kind kind = 1;
    optional double width = 2;
    optional string colorHex = 3;       // QColor::name(QColor::HexArgb)
    repeated PenPoint points = 4;
    optional string id = 5;             // UUID
}

message Scale {
    optional Length scaleNumerator = 1;
    optional Length scaleDenominator = 2;
}

message Sketch {
    optional FileVersion fileVersion = 1;
    enum ViewType {
        Plan = 0;
        RunningProfile = 1;
        ProjectedProfile = 2;
    }
    optional string id = 2;
    optional string name = 3;
    optional ViewType viewType = 4;
    optional Scale mapScale = 5;
    optional string referenceStationName = 6; // reserved for RP/PP (future)
    repeated PenStroke strokes = 7;
    optional string anchorStation = 8; // per-trip centerline anchor station
}

///////////////////////////////////////////////////
// Messages below this are for cacheing data, this data is stored locally
// reduces recomputing when loading a project

message DiskCacheEntry {
    optional string checksum = 1;
    optional bytes entry = 2;
}
